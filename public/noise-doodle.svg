<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <!-- 可平铺涂鸦纹理：稀疏白色小图案（准星/星星/子弹/闪电/爱心/圆点），页面层再压 6% 透明度 -->
  <g fill="#FFFFFF" opacity="0.55">
    <!-- 星星 -->
    <path d="M96 52l5 12 13 1-10 9 3 13-11-7-11 7 3-13-10-9 13-1z"/>
    <path d="M396 268l4 10 11 1-8 8 2 11-9-6-10 6 3-11-8-8 11-1z"/>
    <path d="M196 396l4 10 11 1-8 8 2 11-9-6-10 6 3-11-8-8 11-1z"/>
    <!-- 爱心 -->
    <path d="M70 216q-12-14 2-24q9-6 16 2q7-8 16-2q14 10 2 24l-18 16z"/>
    <path d="M380 96q-10-12 2-20q8-5 13 2q6-7 14-2q12 8 1 20l-15 13z"/>
    <!-- 闪电 -->
    <path d="M296 44l-16 24h10l-4 20 16-24h-10z"/>
    <path d="M120 332l-14 21h9l-4 18 15-22h-9z"/>
  </g>
  <g fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.55" stroke-linecap="round">
