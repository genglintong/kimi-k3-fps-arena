    <g>
      <circle cx="200" cy="140" r="14"/>
      <path d="M200 118v8M200 154v8M178 140h8M214 140h8"/>
    </g>
    <g>
      <circle cx="420" cy="400" r="12"/>
      <path d="M420 382v6M420 412v6M402 400h6M432 400h6"/>
    </g>
    <!-- 子弹形（胶囊 + 底火） -->
    <g>
      <rect x="312" y="176" width="34" height="14" rx="7"/>
      <path d="M312 183h-8"/>
    </g>
    <g transform="rotate(30 80 420)">
      <rect x="60" y="413" width="30" height="13" rx="6.5"/>
      <path d="M60 419.5h-7"/>
    </g>
    <!-- 小三角 -->
    <path d="M256 300l14 22h-28z"/>
  </g>
  <g fill="#FFFFFF" opacity="0.45">
    <!-- 圆点群 -->
    <circle cx="36" cy="120" r="3"/>
    <circle cx="52" cy="108" r="2.2"/>
    <circle cx="44" cy="132" r="1.8"/>
    <circle cx="280" cy="380" r="3"/>
    <circle cx="296" cy="368" r="2.2"/>
    <circle cx="264" cy="392" r="1.8"/>
    <circle cx="440" cy="180" r="2.6"/>
    <circle cx="452" cy="196" r="1.8"/>
    <circle cx="160" cy="270" r="2.4"/>
    <circle cx="176" cy="282" r="1.7"/>
  </g>
</svg>
